<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#dc2626" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#1e1e1e" rx="18"/>

  <!-- Icon box -->
  <rect x="130" y="120" width="100" height="100" rx="20" fill="url(#iconGrad)" filter="url(#iconShadow)"/>

  <!-- Code brackets in icon -->
  <text x="180" y="188" font-family="'Courier New', monospace" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>

  <!-- Status dot -->
  <circle cx="220" cy="130" r="12" fill="#c0c0c0"/>
  <circle cx="220" cy="130" r="8" fill="#c0c0c0"/>

  <!-- Brand text -->
  <text x="250" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
    <tspan fill="#dc2626">Tiger</tspan><tspan fill="#c0c0c0">Code</tspan><tspan fill="#dc2626">Pilot</tspan>
  </text>

  <!-- Subtitle -->
  <text x="250" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#808080" text-anchor="middle" letter-spacing="6">AI COPILOT EXTENSION</text>

  <!-- Bottom accent line -->
  <line x1="150" y1="370" x2="350" y2="370" stroke="#30363d" stroke-width="1"/>
  <circle cx="150" cy="370" r="3" fill="#dc2626" opacity="0.6"/>
  <circle cx="350" cy="370" r="3" fill="#dc2626" opacity="0.6"/>
</svg>
