<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgDark" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2d1f1f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="redCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <filter id="coreBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="silverGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgDark)" rx="18"/>

  <!-- Outer orbit -->
  <circle cx="250" cy="200" r="180" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.25"/>
  <circle cx="250" cy="200" r="220" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.15"/>

  <!-- Silver orbit dots -->
  <circle cx="250" cy="20" r="10" fill="#c0c0c0" filter="url(#silverGlow)"/>
  <circle cx="250" cy="380" r="10" fill="#c0c0c0" filter="url(#silverGlow)"/>
  <circle cx="30" cy="200" r="10" fill="#c0c0c0" filter="url(#silverGlow)"/>

  <!-- Pulsing core -->
  <circle cx="250" cy="200" r="80" fill="url(#redCore)" filter="url(#coreBloom)"/>

  <!-- Code brackets in core -->
  <text x="250" y="220" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>

  <!-- Bold brand text -->
  <text x="250" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8">
    <tspan fill="#dc2626">TIGER</tspan><tspan fill="#c0c0c0">CODE</tspan><tspan fill="#dc2626">PILOT</tspan>
  </text>

  <!-- Subtitle -->
  <text x="250" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#808080" text-anchor="middle" letter-spacing="12">AUTONOMOUS AGENT</text>
</svg>
