<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" fill="url(#bgGrad)" rx="16"/>

  <!-- Orbit ring -->
  <circle cx="64" cy="52" r="36" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>

  <!-- Orbit dots -->
  <circle cx="64" cy="16" r="4" fill="#dc2626" filter="url(#bloom)"/>
  <circle cx="28" cy="52" r="4" fill="#c0c0c0"/>

  <!-- Core circle -->
  <circle cx="64" cy="52" r="22" fill="url(#coreGrad)" filter="url(#bloom)"/>

  <!-- Code brackets -->
  <text x="64" y="60" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>

  <!-- Text -->
  <text x="64" y="96" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    <tspan fill="#dc2626">Tiger</tspan><tspan fill="#c0c0c0">Code</tspan>
  </text>
  <text x="64" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="400" fill="#6e7681" text-anchor="middle" letter-spacing="3">PILOT</text>
</svg>
