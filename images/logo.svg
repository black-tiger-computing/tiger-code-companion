<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="60%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <filter id="redBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGlow)" rx="18"/>

  <!-- Outer orbit ring -->
  <circle cx="250" cy="210" r="160" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="210" r="200" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.2"/>

  <!-- Orbit dots -->
  <circle cx="250" cy="50" r="8" fill="#dc2626" filter="url(#redBloom)"/>
  <circle cx="250" cy="370" r="8" fill="#dc2626" filter="url(#redBloom)"/>
  <circle cx="50" cy="210" r="8" fill="#c0c0c0" filter="url(#redBloom)"/>
  <circle cx="450" cy="210" r="8" fill="#c0c0c0" filter="url(#redBloom)"/>

  <!-- Center circle -->
  <circle cx="250" cy="210" r="70" fill="url(#coreGlow)" filter="url(#redBloom)"/>

  <!-- Code brackets -->
  <text x="250" y="230" font-family="'Courier New', monospace" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>

  <!-- Brand text -->
  <text x="250" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">
    <tspan fill="#dc2626">Tiger</tspan>
    <tspan fill="#c0c0c0">Code</tspan>
    <tspan fill="#dc2626">Pilot</tspan>
  </text>

  <!-- Version badge -->
  <rect x="190" y="365" width="120" height="28" rx="14" fill="#dc2626"/>
  <text x="250" y="384" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">v0.4.0</text>

  <!-- Bottom accent -->
  <line x1="150" y1="420" x2="350" y2="420" stroke="#30363d" stroke-width="1"/>
  <circle cx="150" cy="420" r="3" fill="#dc2626" opacity="0.6"/>
  <circle cx="350" cy="420" r="3" fill="#dc2626" opacity="0.6"/>
</svg>
