<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Code Pilot - Combined Logos</title>
    <style>
        body {
            margin: 0;
            padding: 60px;
            background: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .variation-section {
            margin-bottom: 100px;
            padding: 80px;
            border-radius: 16px;
            position: relative;
            border: 1px solid #30363d;
        }

        .variation-label {
            position: absolute;
            top: 24px;
            left: 32px;
            color: #6e7681;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
        }

        /* Combined 03+04: Agent Core + Minimal Dev */
        .combined-03-04 {
            background: radial-gradient(circle at center, #1a1f2e 0%, #0a0f1c 100%);
        }

        .agent-minimal {
            text-align: center;
        }

        .code-bracket-orbit {
            width: 160px;
            height: 160px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit-ring {
            position: absolute;
            border: 2px solid rgba(220, 38, 38, 0.3);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .orbit-1 {
            width: 160px;
            height: 160px;
        }

        .orbit-2 {
            width: 200px;
            height: 200px;
            animation-direction: reverse;
            animation-duration: 25s;
        }

        .orbit-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #dc2626;
            border-radius: 50%;
            box-shadow: 0 0 12px #dc2626;
        }

        .dot-1 { top: -5px; left: 50%; transform: translateX(-50%); }
        .dot-2 { bottom: -5px; left: 50%; transform: translateX(-50%); }
        .dot-3 { top: 50%; left: -5px; transform: translateY(-50%); }
        .dot-4 { top: 50%; right: -5px; transform: translateY(-50%); }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .center-brackets {
            font-size: 72px;
            font-weight: bold;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.6);
            z-index: 1;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 4px;
            margin: 0 0 12px 0;
        }

        .brand-name .red {
            color: #dc2626;
        }

        .brand-name .silver {
            color: #c0c0c0;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
        }

        /* Combined 06+04: VS Code + Minimal Dev */
        .combined-06-04 {
            background: #1e1e1e;
        }

        .vscode-minimal {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .vscode-icon-box {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #ffffff;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            position: relative;
            box-shadow: 0 8px 24px rgba(220, 38, 38, 0.4);
        }

        .vscode-icon-box::after {
            content: '';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #c0c0c0;
            border-radius: 50%;
            border: 3px solid #1e1e1e;
            box-shadow: 0 0 8px rgba(192, 192, 192, 0.6);
        }

        .vscode-text-block h1 {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .vscode-text-block h1 .red {
            color: #dc2626;
        }

        .vscode-text-block h1 .silver {
            color: #c0c0c0;
        }

        .vscode-text-block p {
            font-size: 16px;
            color: #808080;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Bonus: Dark Red Agent Core */
        .bonus-dark {
            background: radial-gradient(circle at center, #2d1f1f 0%, #0a0a0a 100%);
        }

        .dark-agent {
            text-align: center;
        }

        .dark-core {
            width: 120px;
            height: 120px;
            margin: 0 auto 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dc2626, #7f1d1d);
            position: relative;
            animation: pulse-core 3s ease-in-out infinite;
            box-shadow: 0 0 80px rgba(220, 38, 38, 0.6),
                        0 0 120px rgba(220, 38, 38, 0.3);
        }

        @keyframes pulse-core {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .dark-core-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: bold;
            color: #ffffff;
            font-family: 'Courier New', monospace;
        }

        .dark-orbit {
            position: absolute;
            border: 2px solid rgba(220, 38, 38, 0.25);
            border-radius: 50%;
        }

        .dark-orbit-1 {
            width: 180px;
            height: 180px;
            top: -30px;
            left: -30px;
            animation: rotate 18s linear infinite;
        }

        .dark-orbit-2 {
            width: 240px;
            height: 240px;
            top: -60px;
            left: -60px;
            animation: rotate 24s linear infinite reverse;
        }

        .dark-orbit-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #c0c0c0;
            border-radius: 50%;
            box-shadow: 0 0 12px #c0c0c0;
        }

        .dark-dot-1 { top: -6px; left: 50%; transform: translateX(-50%); }
        .dark-dot-2 { bottom: -6px; left: 50%; transform: translateX(-50%); }
        .dark-dot-3 { top: 50%; left: -6px; transform: translateY(-50%); }

        .dark-brand {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 6px;
        }

        .dark-brand .red { color: #dc2626; }
        .dark-brand .silver { color: #c0c0c0; }

        .dark-sub {
            font-size: 18px;
            color: #808080;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Combined 03+04: Agent Core + Minimal Dev -->
    <div class="variation-section combined-03-04">
        <div class="variation-label">03+04 — Agent Core + Minimal Dev</div>
        <div class="logo-wrapper">
            <div class="agent-minimal">
                <div class="code-bracket-orbit">
                    <div class="orbit-ring orbit-1">
                        <div class="orbit-dot dot-1"></div>
                        <div class="orbit-dot dot-2"></div>
                    </div>
                    <div class="orbit-ring orbit-2">
                        <div class="orbit-dot dot-3"></div>
                        <div class="orbit-dot dot-4"></div>
                    </div>
                    <div class="center-brackets">&lt;/&gt;</div>
                </div>
                <h1 class="brand-name">
                    <span class="red">Tiger</span><span class="silver">Code</span><span class="red">Pilot</span>
                </h1>
                <div class="version-badge">v0.4.0</div>
            </div>
        </div>
    </div>

    <!-- Combined 06+04: VS Code + Minimal Dev -->
    <div class="variation-section combined-06-04">
        <div class="variation-label">06+04 — VS Code + Minimal Dev</div>
        <div class="logo-wrapper">
            <div class="vscode-minimal">
                <div class="vscode-icon-box">&lt;/&gt;</div>
                <div class="vscode-text-block">
                    <h1>
                        <span class="red">Tiger</span><span class="silver">Code</span><span class="red">Pilot</span>
                    </h1>
                    <p>AI Copilot Extension</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bonus: Dark Red Agent Core -->
    <div class="variation-section bonus-dark">
        <div class="variation-label">Bonus — Dark Red Core</div>
        <div class="logo-wrapper">
            <div class="dark-agent">
                <div class="code-bracket-orbit" style="width: 240px; height: 240px;">
                    <div class="dark-core">
                        <div class="dark-core-text">&lt;/&gt;</div>
                    </div>
                    <div class="dark-orbit dark-orbit-1">
                        <div class="dark-orbit-dot dark-dot-1"></div>
                        <div class="dark-orbit-dot dark-dot-2"></div>
                    </div>
                    <div class="dark-orbit dark-orbit-2">
                        <div class="dark-orbit-dot dark-dot-3"></div>
                    </div>
                </div>
                <div class="dark-brand">
                    <span class="red">TIGER</span><span class="silver">CODE</span><span class="red">PILOT</span>
                </div>
                <div class="dark-sub">Autonomous Agent</div>
            </div>
        </div>
    </div>
</body>
</html>
