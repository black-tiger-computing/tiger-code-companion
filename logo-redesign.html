<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerCode Logo - Redesigned</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0f1c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo-container {
            text-align: center;
            padding: 60px;
        }

        .logo-icon {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            position: relative;
        }

        .tiger-face {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 25%, #FFB347 50%, #FF8C42 75%, #FF6B35 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.4),
                        0 0 80px rgba(255, 140, 66, 0.2);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .tiger-face::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 15%;
            height: 20%;
            background: #1a1f2e;
            border-radius: 50%;
            box-shadow: 
                45px 0 0 #1a1f2e,
                0 30px 0 5px #1a1f2e,
                45px 30px 0 5px #1a1f2e;
        }

        .tiger-stripe {
            position: absolute;
            background: #1a1f2e;
            border-radius: 50%;
        }

        .stripe-1 { width: 20px; height: 50px; top: 10%; left: 10%; transform: rotate(-20deg); }
        .stripe-2 { width: 20px; height: 50px; top: 10%; right: 10%; transform: rotate(20deg); }
        .stripe-3 { width: 25px; height: 60px; bottom: 15%; left: 15%; transform: rotate(-15deg); }
        .stripe-4 { width: 25px; height: 60px; bottom: 15%; right: 15%; transform: rotate(15deg); }

        .code-bracket {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            color: #1a1f2e;
            font-family: 'Courier New', monospace;
        }

        .bracket-left {
            left: 25%;
            top: 50%;
            transform: translateY(-50%);
        }

        .bracket-right {
            right: 25%;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
        }

        .logo-text {
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .brand-name span {
            background: linear-gradient(135deg, #FF6B35, #FFB347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 24px;
            color: #8892b0;
            letter-spacing: 6px;
            margin-top: 10px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(to right, #FF6B35, #FFB347);
            margin: 20px auto;
            border-radius: 2px;
        }

        .version-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #4a5568;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">
            <div class="tiger-face">
                <div class="tiger-stripe stripe-1"></div>
                <div class="tiger-stripe stripe-2"></div>
                <div class="tiger-stripe stripe-3"></div>
                <div class="tiger-stripe stripe-4"></div>
                <div class="code-bracket bracket-left">&lt;</div>
                <div class="code-bracket bracket-right">&gt;</div>
            </div>
        </div>
        
        <div class="logo-text">
            <h1 class="brand-name"><span>Tiger</span>Code</h1>
            <div class="divider"></div>
            <p class="tagline">Your Future in Code</p>
        </div>
    </div>

    <div class="version-label">v2.0 Redesign</div>
</body>
</html>
